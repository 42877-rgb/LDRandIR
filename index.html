<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- Google Fonts เพื่อความสวยงาม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .btn-start {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2);
            margin-bottom: 20px;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        .btn-start:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #fff;
            outline: 1px solid #ddd;
        }

        #webcam-container canvas {
            display: block;
            border-radius: 8px;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .label-row {
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            color: #495057;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .loading {
            font-size: 14px;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">Start</button>
    <div id="webcam-container">
        <span class="loading" id="placeholder-text">ยังไม่ได้เปิดกล้อง</span>
    </div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/flTyI50XI/";[cite: 3]

    let model, webcam, labelContainer, maxPredictions;
    let nextPredictTime = 0; // ตัวแปรสำหรับคำนวณเวลาถอยหลัง 3 วินาที

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const placeholderText = document.getElementById("placeholder-text");
        
        startBtn.disabled = true;
        startBtn.innerText = "Loading...";

        try {
            const modelURL = URL + "model.json";[cite: 3]
            const metadataURL = URL + "metadata.json";[cite: 3]

            // โหลดโมเดลด้วยคำสั่งเดิมที่ใช้ได้[cite: 3]
            model = await tmImage.load(modelURL, metadataURL);[cite: 3]
            maxPredictions = model.getTotalClasses();[cite: 3]

            // ใช้ระบบเปิดเว็บแคมดั้งเดิมของ Teachable Machine (แก้ปัญหากล้องไม่ขึ้น)[cite: 3]
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);[cite: 3]
            await webcam.setup();[cite: 3]
            await webcam.play();[cite: 3]
            
            // เริ่มต้นวาดเฟรมภาพกล้องลูปต่อเนื่อง
            window.requestAnimationFrame(loop);

            // แสดงผลกล้องบนหน้าเว็บ
            const webcamContainer = document.getElementById("webcam-container");
            webcamContainer.innerHTML = ""; 
            webcamContainer.appendChild(webcam.canvas);[cite: 3]
            
            // เตรียมพื้นที่แสดงข้อความคะแนน
            labelContainer = document.getElementById("label-container");[cite: 3]
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) {[cite: 3]
                labelContainer.appendChild(document.createElement("div"));[cite: 3]
            }

            startBtn.innerText = "Running...";
            
            // ตั้งเวลาให้ทำการทำนายผลทันทีในเฟรมแรก
            nextPredictTime = Date.now();

        } catch (error) {
            console.error(error);
            alert("เปิดกล้องล้มเหลว! ตรวจสอบสิทธิ์การเข้าถึงกล้อง หรือรันผ่านโปรโตคอล HTTPS");
            startBtn.disabled = false;
            startBtn.innerText = "Start";
        }
    }

    async function loop() {
        webcam.update(); // อัปเดตกล้องเรื่อยๆ ให้ภาพสดใหม่ไม่ค้าง[cite: 3]
        
        const currentTime = Date.now();
        // ถ้าเวลาปัจจุบันเดินไปถึงเวลาที่กำหนดไว้ (ทุกๆ 3 วินาที)
        if (currentTime >= nextPredictTime) {
            await predict(); // ส่งรูปในแคนวาสกล้องไปให้ AI ตรวจจับ[cite: 3]
            nextPredictTime = currentTime + 3000; // ตั้งเวลาตรวจจับรอบถัดไปอีก 3 วินาทีข้างหน้า
        }
        
        window.requestAnimationFrame(loop);[cite: 3]
    }

    async function predict() {
        // ใช้คำสั่งทำนายผลดั้งเดิมจาก canvas ของไลบรารี[cite: 3]
        const prediction = await model.predict(webcam.canvas);[cite: 3]
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            // จัดแต่งข้อความให้สวยงามแยกคลาสกับคะแนนเป็นเปอร์เซ็นต์
            const className = prediction[i].className;[cite: 3]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%"; 
            
            labelContainer.childNodes[i].className = "label-row";
            labelContainer.childNodes[i].innerHTML = `
                <strong>${className}</strong>
                <span>${probability}</span>
            `;
        }
    }
</script>
</body>
</html></script>
